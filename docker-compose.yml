services:
  db:
    image: postgres:16-alpine
    container_name: green-edu-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: rootroot
      POSTGRES_DB: tatrian_kitchen
    volumes:
      - green_edu_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tatrian_kitchen"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s

volumes:
  green_edu_pgdata:
